<script>
// ========== بنك الأسئلة النهائي (113 سؤالاً) ==========
const originalQuestions = [
    {type:'mcq',q:"العدد (19) يكتب هكذا مع كلمة (طالباً):",o:["تسعة عشر طالباً","تسع عشرة طالباً","تسعة عشرة طالباً","تسع عشر طالباً"],a:0},
    {type:'tf',q:"العدد (80) يعرب إعراب جمع المذكر السالم. (صواب أم خطأ)",a:!0,exp:"صواب؛ ألفاظ العقود ترفع بالواو وتنصب وتجر بالياء."},
    {type:'mcq',q:"تمييز العدد (ألف) في قولنا: 'قرأت ألف كتابٍ' هو:",o:["كتابٍ (مجرور)","كتاباً (منصوب)","كتابُ (مرفوع)","كتبٍ (جمع مجرور)"],a:0},
    {type:'tf',q:"العدد (5) يخالف المعدود في التذكير والتأنيث. (صواب أم خطأ)",a:!0,exp:"صواب؛ نقول: خمسة رجال، خمس نساء."},
    {type:'mcq',q:"ما إعراب كلمة (رجلٍ) في: 'جاء ثلاثةُ رجالٍ'؟",o:["تمييز مجرور","مضاف إليه مجرور","فاعل مرفوع","مفعول به منصوب"],a:1},
    {type:'mcq',q:"الصيغة الصحيحة للعدد (14) مع (قصة):",o:["أربع عشرة قصةً","أربعة عشر قصةً","أربع عشر قصةً","أربعة عشرة قصةً"],a:0},
    {type:'tf',q:"العدد (100) تمييزه مفرد مجرور. (صواب أم خطأ)",a:!0,exp:"صواب؛ نقول: مئةُ كتابٍ."},
    {type:'mcq',q:"'في المكتبة 70 روايةً'. العدد (70) يُعرب:",o:["فاعل مرفوع بالواو","مفعول به منصوب بالياء","مبتدأ مرفوع بالواو","خبر مرفوع بالواو"],a:0},
    {type:'tf',q:"العددان (1،2) يطابقان المعدود دائماً. (صواب أم خطأ)",a:!0,exp:"صواب؛ واحد واثنان يوافقان المعدود."},
    {type:'mcq',q:"قال تعالى: (وَلَبِثُوا فِي كَهْفِهِمْ ثَلَاثَ مِائَةٍ سِنِينَ). ما إعراب (سِنِينَ)؟",o:["مضاف إليه مجرور","تمييز منصوب","بدل","مفعول فيه"],a:0},
    {type:'tf',q:"حلَّقت في السماء إحدى عشرة طائرة. ما تحته خط: مرفوع بالضمة المقدرة. (صواب أم خطأ)",a:!0,exp:"صواب؛ العدد مبني على فتح الجزأين في محل رفع، والضمة مقدرة على آخره."},
    {type:'tf',q:"«عواقب ...... طالباً على تقصيرهم». العدد المناسب للفراغ: اثنان عشر. (صواب أم خطأ)",a:!1,exp:"خطأ؛ الصواب: اثنا عشر (لأن المعدود مذكر)."},
    {type:'tf',q:"كرَّمتُ خمسة عشر فائزاً. ما تحته خط: عدد مبني على فتح الجزأين في محل نصب مفعول به. (صواب أم خطأ)",a:!0,exp:"صواب؛ العدد مبني على فتح الجزأين في محل نصب مفعول به."},
    {type:'tf',q:"العددان (واحد واثنان) لا يحتاجان إلى تمييز. (صواب أم خطأ)",a:!0,exp:"صواب؛ يكتفى بالمعدود."},
    {type:'tf',q:"الأعداد من (3 إلى 10) تمييزها جمع مجرور. (صواب أم خطأ)",a:!0,exp:"صواب؛ تمييز الأعداد (3-10) جمع مجرور بالإضافة."},
    {type:'tf',q:"ألفاظ العقود (20-90) تأتي بصيغة واحدة مع المذكر والمؤنث. (صواب أم خطأ)",a:!0,exp:"صواب؛ ألفاظ العقود لا تذكير فيها ولا تأنيث."},
    {type:'tf',q:"قرأتُ ثلاثةَ كتبٍ. العدد (ثلاثة) معرب. (صواب أم خطأ)",a:!0,exp:"صواب؛ الأعداد من (3-10) معربة إعراب الاسم."},
    {type:'tf',q:"الصيغة الصحيحة لـ: مررتُ بعشرِ محطاتٍ. التمييز منصوب. (صواب أم خطأ)",a:!1,exp:"خطأ؛ التمييز مجرور بالإضافة (محطاتٍ)."},
    {type:'mcq',q:"أعطيتُ ...... جائزةً.",o:["ثمانٍ","ثماني","ثمانون","ثمانية"],a:1},
    {type:'mcq',q:"شاهدتُ ...... مسرحاً.",o:["ثلاثةَ عشرَ","ثلاثَ عشرةَ","ثلاثةَ عشرةَ","ثلاثَ عشرَ"],a:0},
    {type:'mcq',q:"في المطار ...... مسافرٍ.",o:["مئةُ","مئةَ","مئةٍ","مئاتُ"],a:0},
    {type:'mcq',q:"في القصة ...... فصلاً.",o:["ستةَ عشرَ","ستَّ عشرةَ","ستةَ عشرةَ","ستَّ عشرَ"],a:0},
    {type:'mcq',q:"استمعتُ إلى ...... من المذيعاتِ.",o:["ثماني","ثمانٍ","ثمانون","ثمانية"],a:0},
    {type:'mcq',q:"في السنة ...... شهراً.",o:["اثنا عشرَ","اثنتا عشرةَ","اثني عشرَ","اثنتي عشرةَ"],a:0},
    {type:'mcq',q:"كافأتِ المديرةُ ...... طالبةً.",o:["الثانيةَ عشرةَ","الثانيَ عشرَ","الثانيةِ عشرةِ","الثانيِ عشرِ"],a:0},
    {type:'mcq',q:"أكمل بـ: كرّمت اللجنة العلمية ...... طلاب.",o:["أربع","أربعة","أربعاً","أربعةً"],a:1},
    {type:'mcq',q:"كافأ المعلم ...... من الطلاب.",o:["أربع","أربعة","أربعاً","أربعةً"],a:1},
    {type:'mcq',q:"أشرف على حفل تكريم الطلاب عشرُ ......",o:["معلمين","معلمات","معلمون","معلماتٍ"],a:1},
    {type:'mcq',q:"شهدتُ ...... أثراً تاريخياً.",o:["أحدَ عشرَ","إحدى عشرةَ","أحدَ عشرةَ","إحدى عشرَ"],a:0},
    {type:'mcq',q:"قال تعالى: (فَانفَجَرَتْ مِنْهُ اثْنَتَا عَشْرَةَ عَيْنًا) [البقرة: 60]. كلمة (عَيْنًا) تُعرب:",o:["تمييز منصوب","مفعول به","فاعل","مضاف إليه"],a:0},
    {type:'mcq',q:"قال تعالى: (سَخَّرَهَا عَلَيْهِمْ سَبْعَ لَيَالٍ وَثَمَانِيَةَ أَيَّامٍ) [الحاقة: 7]. إعراب (لَيَالٍ):",o:["تمييز منصوب","مضاف إليه مجرور","مفعول به","ظرف زمان"],a:0},
    {type:'mcq',q:"قال تعالى: (إِنَّ عِدَّةَ الشُّهُورِ عِندَ اللَّهِ اثْنَا عَشَرَ شَهْرًا) [التوبة: 36]. (شَهْرًا) تعرب:",o:["تمييز منصوب","مفعول به","خبر إن","مضاف إليه"],a:0},

const timerBar = document.getElementById('timerBar');
const timerCheckbox = document.getElementById('timerCheckbox');
const difficultyContainer = document.getElementById('difficultyContainer');
const totalQSpan = document.getElementById('totalQ');

// Service Worker للتطبيق (يعمل دون اتصال)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register("data:application/javascript,self.addEventListener('install',()=>self.skipWaiting());self.addEventListener('activate',()=>clients.claim());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))))");
  });
}

// الأصوات
function initAudio(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)}catch(e){}}
function playSound(type){
    try{
        if(!audioCtx)initAudio();
        if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
        if(audioCtx){
            let osc=audioCtx.createOscillator(),gain=audioCtx.createGain();
            osc.connect(gain);gain.connect(audioCtx.destination);
            if(type==='correct'){osc.frequency.value=880;gain.gain.setValueAtTime(.3,audioCtx.currentTime);gain.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+.2);osc.start();osc.stop(audioCtx.currentTime+.2)}
            else if(type==='wrong'){osc.frequency.value=440;gain.gain.setValueAtTime(.3,audioCtx.currentTime);gain.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+.25);osc.start();osc.stop(audioCtx.currentTime+.25)}
            else if(type==='countdown'){osc.frequency.value=600;gain.gain.setValueAtTime(.2,audioCtx.currentTime);gain.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+.1);osc.start();osc.stop(audioCtx.currentTime+.1)}
            else if(type==='heart'){osc.frequency.value=330;gain.gain.setValueAtTime(.3,audioCtx.currentTime);gain.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+.3);osc.start();osc.stop(audioCtx.currentTime+.3);}
            else if(type==='skip'){osc.frequency.value=550;gain.gain.setValueAtTime(.2,audioCtx.currentTime);gain.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+.15);osc.start();osc.stop(audioCtx.currentTime+.15);}
        }
    }catch(e){}
}

// خلط الأسئلة
function shuffleQuestions(){
    currentQuestions = [...questions];
    for(let i=currentQuestions.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [currentQuestions[i],currentQuestions[j]]=[currentQuestions[j],currentQuestions[i]];
    }
    alert('تم خلط الأسئلة بنجاح!');
}
function resetQuestions(){
    currentQuestions = [...questions];
}

function updateHearts(){
    let str='';
    for(let h=0;h<3;h++) str+=(h<lives)?'❤️':'🖤';
    heartsDisplay.innerText=str;
}

function startCountdown(){
    initAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    if(currentQuestions.length===0) resetQuestions();
    startDiv.style.display="none";
    let cd=document.createElement("div");cd.id="countdown-screen";cd.innerHTML='<div class="countdown-number" id="cd-num">3</div>';
    document.body.appendChild(cd);let num=3;
    let int=setInterval(()=>{
        num--;
        if(num>0){document.getElementById("cd-num").innerText=num;playSound('countdown');}
        else{clearInterval(int);document.body.removeChild(cd);startGame();}
    },800);
}

function startGame(){
    startDiv.style.display="none"; gameDiv.style.display="block"; endDiv.style.display="none";
    timerEnabled = timerCheckbox.checked;
    timerContainer.style.display = timerEnabled?'block':'none';
    i=0; s=0; lives=3;
    document.getElementById("score").innerText="0";
    totalQSpan.innerText = totalQuestions();
    updateHearts();
    loadQuestion();
}

function clearTimers(){
    if(timer)clearTimeout(timer);
    if(timerInterval)clearInterval(timerInterval);
    timer=null; timerInterval=null;
}

function startQuestionTimer(){
    if(!timerEnabled)return;
    timeLeft = difficultyTime;
    timerDisplay.innerText=timeLeft;
    timerBar.style.width='100%';
    timerInterval=setInterval(()=>{
        timeLeft--;
        timerDisplay.innerText=timeLeft;
        timerBar.style.width=(timeLeft/difficultyTime*100)+'%';
        if(timeLeft<=0){
            clearInterval(timerInterval);
            timerInterval=null;
            if(!answered){
                answered=true;
                disableOptions();
                playSound('wrong');
                handleWrongAnswer('⏰ انتهى الوقت!', true);
            }
        }
    },1000);
}

function disableOptions(){
    document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
    let bt=document.getElementById("btnTrue"),bf=document.getElementById("btnFalse");
    if(bt){bt.disabled=true;bf.disabled=true;}
}

function handleWrongAnswer(msg, fromTimer=false){
    lives--;
    playSound('heart');
    updateHearts();
    document.getElementById("msg").innerHTML=msg;
    document.getElementById("msg").style.color="#e74c3c";
    
    if(lives<=0){
        clearTimers();
        setTimeout(()=>endGame(),1000);
        return;
    }
    clearTimers();
    timer=setTimeout(()=>{ i++; if(i<totalQuestions()) loadQuestion(); else endGame(); },2000);
}

function skipQuestion(){
    if(answered || lives<=0) return;
    answered=true;
    clearTimers();
    disableOptions();
    playSound('skip');
    lives--;
    updateHearts();
    document.getElementById("msg").innerHTML="⏭️ تم تخطي السؤال. استهلكت قلباً.";
    document.getElementById("msg").style.color="#ff9800";
    if(lives<=0){ setTimeout(()=>endGame(),1000); return; }
    timer=setTimeout(()=>{ i++; if(i<totalQuestions()) loadQuestion(); else endGame(); },1500);
}

function loadQuestion(){
    clearTimers();
    answered=false;
    let q = currentQuestions[i];
    document.getElementById("qnum").innerText=i+1;
    document.getElementById("q").innerText=q.q;
    document.getElementById("msg").innerHTML="";
    document.getElementById("bar").style.width=(i/totalQuestions()*100)+"%";
    let optsDiv=document.getElementById("opts"),tfDiv=document.getElementById("tf-container");
    if(q.type==='mcq'){
        optsDiv.style.display="block"; tfDiv.style.display="none"; optsDiv.innerHTML="";
        q.o.forEach((opt,idx)=>{
            let btn=document.createElement("button"); btn.className="opt"; btn.innerText=opt;
            btn.onclick=()=>checkMCQ(idx); optsDiv.appendChild(btn);
        });
    }else{
        optsDiv.style.display="none"; tfDiv.style.display="flex";
        let bt=document.getElementById("btnTrue"),bf=document.getElementById("btnFalse");
        bt.disabled=false; bf.disabled=false;
        bt.classList.remove("correct","wrong"); bf.classList.remove("correct","wrong");
        bt.style.background="#2c3e50"; bf.style.background="#2c3e50";
    }
    startQuestionTimer();
}

function checkMCQ(sel){
    if(answered)return;
    answered=true; clearTimers();
    let q=currentQuestions[i],isCorrect=(sel===q.a);
    let allOpts=document.querySelectorAll(".opt");
    allOpts.forEach(b=>b.disabled=true);
    allOpts[q.a].classList.add("correct");
    if(!isCorrect){
        allOpts[sel].classList.add("wrong");
        handleWrongAnswer(`❌ إجابة خاطئة. الصواب: ${q.o[q.a]}`, false);
    }else{
        s+=5; document.getElementById("score").innerText=s;
        document.getElementById("msg").innerHTML="🎉✅ إجابة صحيحة! ممتاز!";
        document.getElementById("msg").style.color="#2ecc71";
        playSound('correct');
        timer=setTimeout(()=>{ i++; if(i<totalQuestions()) loadQuestion(); else endGame(); },1800);
    }
}

function checkTF(ans){
    if(answered)return;
    answered=true; clearTimers();
    let q=currentQuestions[i],isCorrect=(ans===q.a);
    let bt=document.getElementById("btnTrue"),bf=document.getElementById("btnFalse");
    bt.disabled=true; bf.disabled=true;
    (q.a?bt:bf).classList.add("correct");
    if(!isCorrect){
        (ans?bt:bf).classList.add("wrong");
        handleWrongAnswer(`❌ إجابة خاطئة. ${q.exp||''}`, false);
    }else{
        s+=5; document.getElementById("score").innerText=s;
        document.getElementById("msg").innerHTML=`🎉✅ إجابة صحيحة! ${q.exp||''}`;
        document.getElementById("msg").style.color="#2ecc71";
        playSound('correct');
        timer=setTimeout(()=>{ i++; if(i<totalQuestions()) loadQuestion(); else endGame(); },2200);
    }
}

function endGame(){
    clearTimers();
    gameDiv.style.display="none"; endDiv.style.display="block";
    let max=totalQuestions()*5;
    document.getElementById("final").innerText=`${s} / ${max}`;
    let p=(s/max)*100;
    let stars=p>=90?"⭐⭐⭐⭐⭐ ممتاز!":p>=75?"⭐⭐⭐⭐ جيد جداً":p>=60?"⭐⭐⭐ جيد":p>=40?"⭐⭐ مقبول":"⭐ حاول مجدداً";
    document.getElementById("stars").innerHTML=stars;
    if(s>bestScore){
        bestScore=s;
        localStorage.setItem('bestScore', bestScore);
        document.getElementById('bestScoreDisplay').innerText=bestScore;
    }
}

// إعادة ضبط كاملة للعبة بدون إعادة تحميل الصفحة
function resetToStart(){
    clearTimers();
    gameDiv.style.display = 'none';
    endDiv.style.display = 'none';
    startDiv.style.display = 'block';
    document.getElementById('teacherPanel').style.display = 'none';
    i=0; s=0; lives=3; answered=false;
    document.getElementById('score').innerText = '0';
    updateHearts();
    currentQuestions = [...questions];
    totalQSpan.innerText = totalQuestions();
    document.getElementById('bar').style.width = '0%';
    document.getElementById('bestScoreDisplay').innerText = bestScore;
    // إعادة ضبط اختيارات المؤقت والصعوبة للوضع الافتراضي
    timerCheckbox.checked = false;
    difficultyContainer.style.display = 'none';
    document.querySelectorAll('.difficulty-btn').forEach(b=>b.classList.remove('active'));
    document.querySelector('.difficulty-btn[data-time="20"]').classList.add('active');
    difficultyTime = 20;
}

function toggleTeacherPanel(){
    let panel = document.getElementById('teacherPanel');
    if(panel.style.display==='none'){
        let html='<h3>📚 جميع الأسئلة والإجابات (وضع المراجعة)</h3>';
        questions.forEach((q,idx)=>{
            html+=`<p><strong>${idx+1}- ${q.q}</strong><br>`;
            if(q.type==='mcq'){
                html+=`الخيارات: ${q.o.join(' | ')}<br>✅ الإجابة الصحيحة: ${q.o[q.a]}`;
            }else{
                html+=`✅ الإجابة: ${q.a?'صواب':'خطأ'} - ${q.exp||''}`;
            }
            html+='</p>';
        });
        panel.innerHTML=html;
        panel.style.display='block';
    }else{ panel.style.display='none'; }
}

function openRulesModal() { document.getElementById('rulesModal').style.display = 'flex'; }
function closeRulesModal() { document.getElementById('rulesModal').style.display = 'none'; }

timerCheckbox.addEventListener('change', ()=>{
    difficultyContainer.style.display = timerCheckbox.checked?'block':'none';
});
document.querySelectorAll('.difficulty-btn').forEach(btn=>{
    btn.addEventListener('click', function(){
        document.querySelectorAll('.difficulty-btn').forEach(b=>b.classList.remove('active'));
        this.classList.add('active');
        difficultyTime = parseInt(this.dataset.time);
    });
});
window.shuffleQuestions = function(){ shuffleQuestions(); };
resetQuestions();
totalQSpan.innerText = totalQuestions();
</script>
</body>
</html>
